<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>ふたりのやりたいことリスト</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="name-gate" class="overlay">
  <div class="overlay-card">
    <h1>ようこそ</h1>
    <p>あなたの名前を選んでください</p>
    <div class="name-choices">
      <button class="name-choice-btn" data-name="はる">はる</button>
      <button class="name-choice-btn" data-name="みなと">みなと</button>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="top-bar">
    <div class="top-bar-inner">
      <header>
        <h1>🎈 ふたりのやりたいことリスト</h1>
        <div class="user-badge">
          <span id="current-name"></span>さん
          <button id="change-name" title="名前を変更">変更</button>
        </div>
      </header>

      <form id="add-form">
        <input id="add-input" type="text" placeholder="やりたいことを入力…" maxlength="200" autocomplete="off">
        <button type="submit">追加</button>
      </form>
      <label class="private-toggle">
        <input type="checkbox" id="private-checkbox">
        🔒 自分だけに表示（相手には見えません）
      </label>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">すべて</button>
        <button class="filter-btn" data-filter="active">未達成</button>
        <button class="filter-btn" data-filter="done">達成済み</button>
      </div>
    </div>
  </div>

  <ul id="item-list"></ul>

  <p id="empty-msg" class="hidden">まだ何もありません。やりたいことを追加してみましょう！</p>
</div>

<script src="app.js"></script>
</body>
</html>
