<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>やりたいことリスト</title>
<link rel="stylesheet" href="style.css?v=1.3.2">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="やりたいことリスト">
<meta name="theme-color" content="#4DD7E3">
</head>
<body>
<div id="name-gate" class="overlay">
  <div class="overlay-card">
    <h1>ようこそ</h1>
    <p>あなたの名前を選んでください</p>
    <div class="name-choices">
      <button class="name-choice-btn" data-name="はる">はる</button>
      <button class="name-choice-btn" data-name="みなと">みなと</button>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="top-bar">
    <div class="top-bar-inner">
      <header>
        <h1>🎈 やりたいことリスト</h1>
        <div class="user-badge">
          <span id="current-name"></span>さん
          <button id="change-name" title="名前を変更">変更</button>
          <button id="calendar-toggle" title="カレンダー">📅</button>
        </div>
      </header>

      <div id="list-controls">
        <form id="add-form">
          <input id="add-input" type="text" placeholder="やりたいことを入力…" maxlength="200" autocomplete="off">
          <button type="submit">追加</button>
        </form>

        <button type="button" id="details-toggle" class="details-toggle">＋ メモ・期限を追加</button>
        <div id="add-details" class="add-details hidden">
          <textarea id="add-note" placeholder="メモ（任意）" maxlength="500" rows="2"></textarea>
          <label class="due-label">
            期限
            <input type="date" id="add-due">
          </label>
          <label class="repeat-label">
            🔁 繰り返し
            <select id="add-repeat">
              <option value="">なし</option>
              <option value="daily">毎日</option>
              <option value="weekly">毎週</option>
              <option value="monthly">毎月</option>
            </select>
          </label>
          <p class="repeat-hint">※期限がある場合のみ、達成すると次の分が自動で作られます</p>
        </div>

        <label class="private-toggle">
          <input type="checkbox" id="private-checkbox">
          🔒 <span id="private-toggle-other"></span>に見せない
        </label>

        <div class="filters">
          <button class="filter-btn" data-filter="all">すべて</button>
          <button class="filter-btn active" data-filter="active">未達成</button>
          <button class="filter-btn" data-filter="done">達成済み</button>
          <button class="filter-btn" data-filter="abandoned">頓挫</button>
        </div>

        <div class="filters person-filters">
          <button class="person-filter-btn active" data-person="all">ふたり</button>
          <button class="person-filter-btn owner-はる" data-person="はる">はる</button>
          <button class="person-filter-btn owner-みなと" data-person="みなと">みなと</button>
        </div>

        <div class="search-box">
          <input type="search" id="search-input" placeholder="🔍 キーワードで検索…" autocomplete="off">
        </div>
      </div>

      <div id="view-tabs" class="view-tabs">
        <button type="button" class="view-tab-btn active" data-view="list" title="やりたいことリスト">📝</button>
        <button type="button" class="view-tab-btn" data-view="ideas" title="思いつきメモ">💡</button>
        <button type="button" class="view-tab-btn" data-view="trash" title="ゴミ箱">🗑️</button>
      </div>
    </div>
  </div>

  <ul id="item-list"></ul>

  <p id="empty-msg" class="hidden">まだ何もありません。やりたいことを追加してみましょう！</p>

  <div id="calendar-view" class="hidden">
    <div class="calendar-close-row">
      <button type="button" id="cal-close" title="閉じる">✕</button>
    </div>
    <div class="calendar-header">
      <button type="button" id="cal-prev">‹</button>
      <div id="cal-month-label"></div>
      <button type="button" id="cal-next">›</button>
    </div>
    <div id="calendar-grid" class="calendar-grid"></div>
    <div id="calendar-day-panel" class="calendar-day-panel hidden">
      <h3 id="cal-day-title"></h3>
      <ul id="cal-day-items"></ul>
      <form id="cal-day-add-form">
        <input type="text" id="cal-day-add-input" placeholder="この日にやりたいことを追加…" maxlength="200" autocomplete="off">
        <button type="submit">追加</button>
      </form>
    </div>
  </div>

  <div id="ideas-view" class="hidden">
    <div class="ideas-header-row">
      <h2>💡 思いつきメモ</h2>
      <button type="button" id="ideas-close" title="閉じる">✕</button>
    </div>
    <form id="idea-add-form">
      <input type="text" id="idea-add-input" placeholder="思いついたことを入力…" maxlength="200" autocomplete="off">
      <button type="submit">追加</button>
    </form>
    <button type="button" id="idea-random-btn" class="idea-random-btn">🎲 ランダムに1つ選ぶ</button>
    <div id="idea-pick" class="idea-pick hidden"></div>
    <ul id="idea-list"></ul>
    <p id="idea-empty-msg" class="hidden">まだ思いつきメモがありません。</p>
  </div>

  <div id="trash-view" class="hidden">
    <div class="ideas-header-row">
      <h2>🗑️ ゴミ箱</h2>
      <button type="button" id="trash-close" title="閉じる">✕</button>
    </div>
    <p class="repeat-hint">削除してから7日経過したものは自動的に完全に消えます。</p>
    <ul id="trash-list"></ul>
    <p id="trash-empty-msg" class="hidden">ゴミ箱は空です。</p>
  </div>

  <footer id="app-footer" class="app-footer">
    <div id="anniversary-counter" class="anniversary-counter"></div>
    <div id="version-line"></div>
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
